name: Build WPF Loopback Project

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build project with MSBuild
        working-directory: ./Loopback
        run: |
          # 关键修改：
          # 1. Platform 改为 AnyCPU（无空格），匹配项目默认配置
          # 2. 手动指定 OutputPath，解决路径未设置的问题
          # 3. 手动指定 BaseIntermediateOutputPath，避免中间文件路径报错
          msbuild Loopback.csproj `
            /p:Configuration=Release `
            /p:Platform=AnyCPU `
            /p:TargetFrameworkVersion=v4.8 `
            /p:OutputPath=./bin/Release/ `
            /p:BaseIntermediateOutputPath=./obj/Release/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Loopback-Release
          path: ./Loopback/bin/Release/
          if-no-files-found: error
